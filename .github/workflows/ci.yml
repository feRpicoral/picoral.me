name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: tests + translate:check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      # Fails non-zero if any translation file is missing or has a stale
      # `_source.hash`. Offline — never calls the Anthropic API.
      - name: Verify translations are up to date
        run: pnpm translate:check
