name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: lint + check + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      # `pnpm build` runs translate:check (offline — never calls Anthropic),
      # regenerates public/llms.txt, then astro build.
      - name: Build
        run: pnpm build
